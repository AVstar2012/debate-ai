<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEBATE.AI | Ultra-Fast AI Perspectives</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(-45deg, #050505, #110e1b, #0a1118, #050505);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #f8fafc; 
            font-family: 'Outfit', sans-serif; 
            overflow-x: hidden; 
        }
        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; }
        .accent-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .text-gradient { background: linear-gradient(135deg, #a855f7 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .for-card { border-top: 4px solid #10b981; transition: all 0.3s ease; }
        .against-card { border-top: 4px solid #ef4444; transition: all 0.3s ease; }
        
        .loader { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        input::placeholder { color: #475569; }
    </style>
</head>
<body class="min-h-screen pb-20">
    <div class="max-w-6xl mx-auto px-6">
        <nav class="py-10 flex justify-between items-center border-b border-white/5 mb-16">
            <div class="text-3xl font-black tracking-tighter">DEBATE<span class="text-indigo-500">.AI</span></div>
            <div class="hidden md:flex gap-8 text-xs font-bold tracking-widest uppercase text-slate-500">
                <span>LPU™ Accelerated</span>
                <span>Groq Llama-3.1</span>
                <span>Enterprise v3.0</span>
            </div>
        </nav>

        <div class="text-center mb-16">
            <h2 class="text-6xl md:text-8xl font-black mb-8 tracking-tighter leading-none italic uppercase">DEBATE <span class="text-indigo-500">AI</span></h2>
            <p class="text-slate-400 text-xl max-w-2xl mx-auto font-light leading-relaxed">Experience zero-latency debate analysis. Our new Groq-powered engine dismantles any topic into high-fidelity arguments instantly.</p>
        </div>

        <div class="glass p-3 mb-20 max-w-4xl mx-auto flex flex-col md:flex-row items-center shadow-2xl gap-2">
            <input id="topic" type="text" placeholder="Enter any topic (e.g., Is nuclear energy the future?)..." 
                class="w-full bg-transparent border-none px-6 py-5 text-xl outline-none text-white font-medium">
            <button onclick="runGroqAnalysis()" class="accent-gradient w-full md:w-auto h-16 px-12 rounded-2xl font-black tracking-wide hover:brightness-110 active:scale-95 transition-all uppercase">
                Analyze
            </button>
        </div>

        <div id="loading" class="hidden text-center py-20">
            <div class="loader mx-auto mb-6"></div>
            <p class="text-indigo-400 font-black tracking-[0.2em] animate-pulse uppercase text-sm">Synthesizing Perspectives...</p>
        </div>

        <div id="results" class="hidden grid lg:grid-cols-2 gap-10">
            <div class="glass for-card p-10 shadow-lg">
                <div class="flex items-center gap-4 mb-10">
                    <span class="bg-green-500/10 text-green-500 px-4 py-1 rounded-full text-xs font-black tracking-widest border border-green-500/20 uppercase">Proponents</span>
                    <h3 class="text-3xl font-extrabold tracking-tight italic">The Case FOR</h3>
                </div>
                <div id="for-box" class="space-y-6"></div>
            </div>

            <div class="glass against-card p-10 shadow-lg">
                <div class="flex items-center gap-4 mb-10">
                    <span class="bg-red-500/10 text-red-500 px-4 py-1 rounded-full text-xs font-black tracking-widest border border-red-500/20 uppercase">Opponents</span>
                    <h3 class="text-3xl font-extrabold tracking-tight italic">The Case AGAINST</h3>
                </div>
                <div id="against-box" class="space-y-6"></div>
            </div>
        </div>
    </div>

    <script>
        // YOUR GROQ API KEY INTEGRATED
        const GROQ_KEY = "gsk_XhF5z23u8fRkM0aL1v9p3q7wB4d9zX6jY2mC8vN1rP5oQ"; // (Note: I used a placeholder, please paste your actual key between these quotes)

        async function runGroqAnalysis() {
            const topicInput = document.getElementById('topic').value.trim();
            if(!topicInput) return;

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [
                            {
                                role: "system",
                                content: "You are a professional debate analyst. You must respond ONLY with a valid JSON object containing two keys: 'for' and 'against'. Each key must have an array of 5 detailed, highly professional points."
                            },
                            {
                                role: "user",
                                content: `Topic: "${topicInput}"`
                            }
                        ],
                        response_format: { "type": "json_object" },
                        temperature: 0.2
                    })
                });

                if (!response.ok) throw new Error("API Connection Failed");

                const data = await response.json();
                const content = JSON.parse(data.choices[0].message.content);

                document.getElementById('for-box').innerHTML = content.for.map(pt => `
                    <div class="p-6 bg-white/[0.03] rounded-2xl border border-white/5 text-slate-300 leading-relaxed shadow-sm">
                        <span class="text-green-500 font-black mr-3 italic">✓</span> ${pt}
                    </div>
                `).join('');

                document.getElementById('against-box').innerHTML = content.against.map(pt => `
                    <div class="p-6 bg-white/[0.03] rounded-2xl border border-white/5 text-slate-300 leading-relaxed shadow-sm">
                        <span class="text-red-500 font-black mr-3 italic">✕</span> ${pt}
                    </div>
                `).join('');

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('results').classList.remove('hidden');
                document.getElementById('results').scrollIntoView({ behavior: 'smooth' });

            } catch (err) {
                document.getElementById('loading').classList.add('hidden');
                alert("SYSTEM ERROR: Please ensure your Groq key is correct and you have a stable connection.");
            }
        }
    </script>
</body>
</html>
